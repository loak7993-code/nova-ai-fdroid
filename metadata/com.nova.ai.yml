Description: |
    Nova AI is a privacy-focused Android AI chat client supporting multiple
    LLM models via OpenAI-compatible APIs, with OpenCode Zen free models
    pre-configured out of the box.

    Features:
    * Multi-model: Big Pickle, DeepSeek V4, MiMo V2.5, Nemotron 3 Ultra, North Mini Code, GLM 5.2, MiniMax M3, Kimi K2.7 Code
    * Free models work without an API key (OpenCode Zen)
    * Streaming with reasoning/thinking display
    * Tool calling: calculator, time, web search (SearXNG)
    * Image vision (Big Pickle, MiniMax M3, Kimi K2.7 Code)
    * Markdown with tables, code blocks, lists
    * No tracking, no ads, no proprietary SDKs
